<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-721 (Evelyn) TTK Test</title>
    <style>
        * { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; touch-action: none; font-family: 'Malgun Gothic', sans-serif; }
        
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 1000px; height: 600px; background-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.3); max-width: 100vw; max-height: 100vh; overflow: hidden; }
        
        #input-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 10; overflow-y: auto; padding: 40px 0; box-sizing: border-box; }
        .input-group { margin: 8px; display: flex; justify-content: space-between; width: 320px; align-items: center; }
        
        .input-group input { width: 100px; padding: 5px; border: 1px solid #ccc; border-radius: 3px; user-select: auto; -webkit-user-select: auto; touch-action: auto; font-size: 16px; }
        
        #start-btn { margin-top: 20px; padding: 12px 40px; font-size: 18px; background: #0064ff; color: white; border: none; cursor: pointer; border-radius: 5px; transition: 0.1s; margin-bottom: 40px; }
        #start-btn:active { background: #004ecc; transform: scale(0.95); }
        
        #gameCanvas { display: none; }
        
        #ui-layer { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .btn { position: absolute; background: rgba(255, 0, 0, 0.5); pointer-events: auto; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 20px; z-index: 20; }
        
        #btn-left { bottom: 40px; left: 20px; width: 60px; height: 60px; }
        #btn-right { bottom: 40px; left: 160px; width: 60px; height: 60px; }
        #btn-jump { bottom: 120px; left: 90px; width: 60px; height: 60px; }
        #btn-atk { bottom: 40px; left: 90px; width: 60px; height: 60px; background: rgba(255, 0, 0, 0.8); }
        #btn-skill { bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(0, 100, 255, 0.7); }
        
        #cooldown-text { position: absolute; bottom: 125px; right: 55px; color: white; font-weight: bold; text-shadow: 1px 1px 2px black; font-size: 18px; }
        
        #game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 40px; font-weight: bold; text-shadow: 2px 2px 4px black; z-index: 30; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="input-screen">
        <h2>Evelyn TTK 테스트 설정</h2>
        <div class="input-group"><label>에블린 체력:</label><input type="number" id="val-php" value="500"></div>
        <div class="input-group"><label>스킬 쿨타임 (초):</label><input type="number" id="val-m" value="3" step="0.1"></div>
        <div class="input-group"><label>스킬 이동 거리 (블럭):</label><input type="number" id="val-n" value="5"></div>
        <div class="input-group"><label>스킬 데미지:</label><input type="number" id="val-k" value="100"></div>
        <hr style="width: 320px; border: 0.5px solid #ddd; margin: 10px 0;">
        <div class="input-group"><label>일반공격 쿨타임 (초):</label><input type="number" id="val-acd" value="0.3" step="0.1"></div>
        <div class="input-group"><label>일반 데미지:</label><input type="number" id="val-l" value="20"></div>
        <div class="input-group"><label>크리티컬 확률 (%):</label><input type="number" id="val-crate" value="20"></div>
        <div class="input-group"><label>크리티컬 뎀증 (%):</label><input type="number" id="val-cdmg" value="50"></div>
        <hr style="width: 320px; border: 0.5px solid #ddd; margin: 10px 0;">
        <div class="input-group"><label>몬스터 스폰량 (최대 30):</label><input type="number" id="val-mspawn" value="3" max="30"></div>
        <div class="input-group"><label>몬스터 체력:</label><input type="number" id="val-r" value="50"></div>
        <div class="input-group"><label>몬스터 공격력:</label><input type="number" id="val-matk" value="10"></div>
        
        <button id="start-btn">테스트 시작</button>
    </div>

    <canvas id="gameCanvas" width="1000" height="600"></canvas>

    <div id="ui-layer">
        <div id="btn-left" class="btn">◀</div>
        <div id="btn-jump" class="btn">▲</div>
        <div id="btn-atk" class="btn">👊</div>
        <div id="btn-right" class="btn">▶</div>
        <div id="btn-skill" class="btn">SKILL</div>
        <div id="cooldown-text">0.0s</div>
    </div>
    
    <div id="game-over">GAME OVER<br><span style="font-size: 20px; color: white;">새로고침(F5)하여 다시 시작</span></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const inputScreen = document.getElementById('input-screen');
    const uiLayer = document.getElementById('ui-layer');
    const startBtn = document.getElementById('start-btn');
    const gameOverScreen = document.getElementById('game-over');
    
    const imgPlayer = new Image(); imgPlayer.src = 'k-721.png';
    const imgMob = new Image(); imgMob.src = 'mob-1.png';

    let m, n, k, r, l, pMaxHp, mAtk, aCd, cRate, cDmg, mSpawn;
    let cameraX = 0;
    let keys = {};
    let touchControls = { left: false, right: false };
    let isGameOver = false;

    let player = {
        x: 200, y: 440, width: 60, height: 60, velY: 0, isJumping: false, facingRight: true,
        hp: 500, lastAtkTime: 0, lastSkillTime: 0, attackDuration: 0, isAttacking: false,
        isDashing: false, dashVelocityX: 0, dashTicksRemaining: 0 
    };
    const DASH_DURATION_TICKS = 10; 
    
    let waterPath = { active: false, x: 0, width: 0, timer: 0 };
    let mobs = [];
    let platforms = [];
    let damageTexts = []; 
    let maxMapX = 0; 

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function setupTouch(id, actionOn, actionOff) {
        const btn = document.getElementById(id);
        if(!btn) return;
        
        btn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            btn.setPointerCapture(e.pointerId);
            actionOn();
        });
        
        btn.addEventListener('pointerup', (e) => {
            e.preventDefault();
            btn.releasePointerCapture(e.pointerId);
            actionOff();
        });
        
        btn.addEventListener('pointercancel', (e) => {
            e.preventDefault();
            actionOff();
        });
    }

    setupTouch('btn-left', () => touchControls.left = true, () => touchControls.left = false);
    setupTouch('btn-right', () => touchControls.right = true, () => touchControls.right = false);
    setupTouch('btn-jump', () => jump(), () => {});
    setupTouch('btn-atk', () => basicAttack(), () => {});
    setupTouch('btn-skill', () => skillDash(), () => {});

    startBtn.addEventListener('click', () => {
        pMaxHp = parseFloat(document.getElementById('val-php').value) || 500;
        m = parseFloat(document.getElementById('val-m').value) || 3;
        n = parseFloat(document.getElementById('val-n').value) || 5;
        k = parseFloat(document.getElementById('val-k').value) || 100;
        aCd = parseFloat(document.getElementById('val-acd').value) || 0.3;
        l = parseFloat(document.getElementById('val-l').value) || 20;
        cRate = parseFloat(document.getElementById('val-crate').value) || 20;
        cDmg = parseFloat(document.getElementById('val-cdmg').value) || 50;
        r = parseFloat(document.getElementById('val-r').value) || 50;
        mAtk = parseFloat(document.getElementById('val-matk').value) || 10;
        
        // [중요 수정] 브라우저 터짐 방지: 어떤 값이 들어와도 최대 30마리로 제한
        let rawSpawn = parseInt(document.getElementById('val-mspawn').value) || 3;
        mSpawn = Math.min(Math.max(rawSpawn, 0), 30); 

        player.hp = pMaxHp;

        maxMapX = 400;
        platforms.push({ x: 400, y: 380, width: 120, height: 20 });
        generateInfiniteMap();

        inputScreen.style.display = 'none';
        canvas.style.display = 'block';
        uiLayer.style.display = 'block';
        requestAnimationFrame(gameLoop);
    });

    function generateInfiniteMap() {
        while (maxMapX < player.x + 2500) {
            let pWidth = 100 + Math.random() * 150;
            let pY = 250 + Math.random() * 150;
            
            platforms.push({ x: maxMapX + 150 + Math.random() * 200, y: pY, width: pWidth, height: 20 });
            
            let numMobs = mSpawn + Math.floor(Math.random() * 3);
            for(let i=0; i<numMobs; i++) {
                mobs.push({ 
                    x: maxMapX + 200 + Math.random() * 300, 
                    y: 450, 
                    width: 50, height: 50, 
                    hp: r, maxHp: r, 
                    alive: true, facingRight: true, lastAtkTime: 0 
                });
            }
            maxMapX += 600; 
        }
    }

    function jump() {
        if (!player.isJumping && !isGameOver) { player.velY = -14; player.isJumping = true; }
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
    }

    function getDamage(baseDmg) {
        let isCrit = (Math.random() * 100) < cRate;
        let finalDmg = isCrit ? baseDmg * (1 + cDmg / 100) : baseDmg;
        return { damage: finalDmg, isCrit: isCrit };
    }

    function addDamageText(x, y, dmgInfo) {
        damageTexts.push({
            x: x, y: y,
            text: dmgInfo.isCrit ? `CRIT! ${dmgInfo.damage.toFixed(0)}` : dmgInfo.damage.toFixed(0),
            color: dmgInfo.isCrit ? '#ffcc00' : '#ffffff',
            life: 30,
            isCrit: dmgInfo.isCrit
        });
    }

    function basicAttack() {
        if (isGameOver) return;
        const now = Date.now();
        if (now - player.lastAtkTime > aCd * 1000) {
            player.lastAtkTime = now;
            player.isAttacking = true;
            player.attackDuration = now;
            
            let atkX = player.facingRight ? player.x + player.width : player.x - 40;
            let atkRect = { x: atkX, y: player.y, width: 40, height: 60 };
            
            mobs.forEach(mob => {
                if (mob.alive && checkCollision(atkRect, mob)) {
                    let hit = getDamage(l);
                    mob.hp -= hit.damage;
                    addDamageText(mob.x, mob.y - 10, hit);
                    
                    mob.x += player.facingRight ? 80 : -80; 
                    if (mob.hp <= 0) mob.alive = false;
                }
            });
        }
    }

    function skillDash() {
        if (isGameOver) return;
        const now = Date.now();
        if (!player.isDashing && now - player.lastSkillTime > m * 1000) {
            player.lastSkillTime = now;
            
            let oldX = player.x;
            const facingDirection = player.facingRight ? 1 : -1;
            let totalDashDistance = Math.abs(n) * 50; 
            let finalX = player.x + (totalDashDistance * facingDirection);
            
            waterPath = { active: true, x: Math.min(oldX, finalX), width: totalDashDistance + player.width, timer: now };
            player.isDashing = true;
            player.dashTicksRemaining = DASH_DURATION_TICKS;
            player.dashVelocityX = (totalDashDistance / DASH_DURATION_TICKS) * facingDirection;

            let dashRect = { x: waterPath.x, y: player.y, width: waterPath.width, height: player.height };
            mobs.forEach(mob => {
                if (mob.alive && checkCollision(dashRect, mob)) {
                    let hit = getDamage(k);
                    mob.hp -= hit.damage;
                    addDamageText(mob.x, mob.y - 10, hit);
                    
                    if (mob.hp <= 0) mob.alive = false;
                }
            });
        }
    }

    function update() {
        if (isGameOver) return;

        // [중요 수정] 메모리 최적화: 지나친 맵과 죽은 몬스터를 배열에서 완전히 삭제
        platforms = platforms.filter(p => p.x > player.x - 1500);
        mobs = mobs.filter(mob => mob.alive && mob.x > player.x - 1500);

        generateInfiniteMap();

        if (player.isDashing) {
            player.x += player.dashVelocityX;
            player.dashTicksRemaining--;
            if (player.dashTicksRemaining <= 0) {
                player.isDashing = false;
                player.dashVelocityX = 0;
            }
        } else {
            if (keys['ArrowLeft'] || touchControls.left) { player.x -= 5; player.facingRight = false; }
            else if (keys['ArrowRight'] || touchControls.right) { player.x += 5; player.facingRight = true; }
        }

        if (keys['ArrowUp']) jump();
        if (keys['KeyZ']) basicAttack();
        if (keys['KeyX']) skillDash();

        player.velY += 0.8;
        let nextY = player.y + player.velY;
        let onGround = false;

        if (nextY >= 440) { nextY = 440; onGround = true; }

        if (player.velY > 0) {
            for (let p of platforms) {
                if (p.x < player.x - 1000) continue; 
                if (player.x + player.width > p.x && player.x < p.x + p.width) {
                    if (player.y + player.height <= p.y + 5 && nextY + player.height >= p.y) {
                        nextY = p.y - player.height;
                        onGround = true;
                    }
                }
            }
        }
        player.y = nextY;
        if (onGround) { player.isJumping = false; player.velY = 0; }

        cameraX = player.x - 300; 
        let now = Date.now();

        mobs.forEach(mob => {
            if (mob.alive) {
                let dist = Math.abs(mob.x - player.x);
                if (dist < 800 && dist > 20) {
                    if (mob.x < player.x) { mob.x += 1.2; mob.facingRight = true; }
                    else if (mob.x > player.x) { mob.x -= 1.2; mob.facingRight = false; }
                }
                if (mob.y < 450) mob.y += 2;
                if (mob.y >= 450) mob.y = 450;

                let yDist = Math.abs(mob.y - player.y);
                if (dist < 60 && yDist < 60 && now - mob.lastAtkTime > 1000) {
                    mob.lastAtkTime = now;
                    player.hp -= mAtk;
                    
                    damageTexts.push({ x: player.x, y: player.y - 20, text: `-${mAtk}`, color: '#ff5555', life: 30, isCrit: false });

                    if (player.hp <= 0) {
                        player.hp = 0;
                        isGameOver = true;
                        gameOverScreen.style.display = 'block';
                    }
                }
            }
        });

        let skillCd = Math.max(0, m - (Date.now() - player.lastSkillTime) / 1000);
        document.getElementById('cooldown-text').innerText = skillCd.toFixed(1) + "s";
    }

    function draw() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#cccccc'; ctx.fillRect(0, 500, canvas.width, canvas.height - 500);
        
        ctx.fillStyle = '#888888'; 
        platforms.forEach(p => {
            if (p.x - cameraX > -200 && p.x - cameraX < canvas.width) {
                ctx.fillRect(p.x - cameraX, p.y, p.width, p.height);
            }
        });

        mobs.forEach(mob => {
            if (mob.alive && mob.x - cameraX > -100 && mob.x - cameraX < canvas.width + 100) {
                ctx.save();
                if (mob.facingRight) {
                    ctx.scale(-1, 1);
                    ctx.translate(-(mob.x - cameraX + mob.width), 0);
                } else {
                    ctx.translate(mob.x - cameraX, 0);
                }

                if(imgMob.complete && imgMob.naturalWidth !== 0) ctx.drawImage(imgMob, 0, mob.y, mob.width, mob.height);
                else { ctx.fillStyle = '#444'; ctx.fillRect(0, mob.y, mob.width, mob.height); }
                ctx.restore(); 
                
                ctx.fillStyle = 'black'; ctx.fillRect(mob.x - cameraX, mob.y - 17, 50, 7);
                ctx.fillStyle = 'red'; ctx.fillRect(mob.x - cameraX + 1, mob.y - 16, 48 * (mob.hp / mob.maxHp), 5);
            }
        });

        if (waterPath.active && Date.now() - waterPath.timer < 300) {
            ctx.fillStyle = 'rgba(0, 150, 255, 0.5)';
            ctx.fillRect(waterPath.x - cameraX, player.y + player.height - 10, waterPath.width, 10);
        }

        if (!isGameOver) {
            ctx.save();
            if (!player.facingRight) { 
                ctx.scale(-1, 1); 
                ctx.translate(-(player.x - cameraX + player.width), 0); 
            } else { 
                ctx.translate(player.x - cameraX, 0); 
            }
            
            if(imgPlayer.complete && imgPlayer.naturalWidth !== 0) ctx.drawImage(imgPlayer, 0, player.y, player.width, player.height);
            else { ctx.fillStyle = 'blue'; ctx.fillRect(0, player.y, player.width, player.height); }
            ctx.restore();

            if (player.isAttacking && Date.now() - player.attackDuration < 150) {
                ctx.font = '30px Arial';
                let fistEmoji = player.facingRight ? '🤜' : '🤛';
                let fistX = player.facingRight ? player.x - cameraX + player.width + 5 : player.x - cameraX - 40;
                ctx.fillText(fistEmoji, fistX, player.y + 40);
            }
            
            ctx.fillStyle = 'black'; ctx.fillRect(player.x - cameraX, player.y - 22, 60, 10);
            ctx.fillStyle = 'lime'; ctx.fillRect(player.x - cameraX + 1, player.y - 21, 58 * (player.hp / pMaxHp), 8);
        }

        for (let i = damageTexts.length - 1; i >= 0; i--) {
            let dt = damageTexts[i];
            ctx.fillStyle = dt.color;
            ctx.font = dt.isCrit ? 'bold 24px Arial' : 'bold 18px Arial';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            
            dt.y -= 1;
            
            ctx.strokeText(dt.text, dt.x - cameraX, dt.y);
            ctx.fillText(dt.text, dt.x - cameraX, dt.y);
            
            dt.life--;
            if (dt.life <= 0) damageTexts.splice(i, 1);
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
});
</script>
</body>
</html>
